<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Watchlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Movie Watchlist</h1>
    <p>Keep track of movies you want to watch and movies you've already seen.</p>
  </header>

  <section>
    <h2>Add a Movie</h2>
    <form id="addForm">
      <input type="text" id="titleInput" placeholder="Movie title" required>
      <input type="number" id="yearInput" placeholder="Year" min="1888" max="2100">
      <input type="text" id="genresInput" placeholder="Genres (comma separated)">
      <button type="button" id="addBtn">Add Movie</button>
    </form>
  </section>

  <section>
    <button id="showAllBtn" class="btn-filter active">All Movies</button>
    <button id="showWatchedBtn" class="btn-filter">Watched</button>
    <button id="showUnwatchedBtn" class="btn-filter">To Watch</button>
    <button id="suggestBtn" class="btn-secondary">Suggest a Movie</button>
  </section>

  <section>
    <h2>Genres</h2>
    <div id="genreFilters"></div>
  </section>

  <section>
    <input type="text" id="searchInput" placeholder="Search movies...">
    <button id="searchBtn">Search</button>
  </section>

  <div id="message"></div>

  <section>
    <h2>Movie List</h2>
    <div id="movieList"></div>
  </section>

  <script src="watchlist.js"></script>
  <script src="app.js"></script>
</body>
</html>
